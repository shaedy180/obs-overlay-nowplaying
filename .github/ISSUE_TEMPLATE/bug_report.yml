name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the form below as completely as possible.

  - type: input
    id: obs-version
    attributes:
      label: OBS Studio Version
      description: Which version of OBS Studio are you using?
      placeholder: e.g. 31.0.2
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser Source Info
      description: Are you using the default OBS browser source or a custom browser?
      placeholder: e.g. Default OBS Browser Source
    validations:
      required: false

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows 10
        - Windows 11
        - macOS
        - Linux
    validations:
      required: true

  - type: input
    id: media-source
    attributes:
      label: Media Source
      description: Which application or media player is providing the Now Playing data?
      placeholder: e.g. Spotify, Firefox, Chrome, foobar2000
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can this bug be reproduced?
      placeholder: |
        1. Add the overlay as a browser source in OBS
        2. Play music in X
        3. Observe Y
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Browser Console Output
      description: If applicable, paste any relevant browser console errors. Right-click the browser source > Interact > open dev tools. This will be formatted as code automatically.
      render: text
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other information that might be helpful (screenshots, videos, OBS settings, etc.).
    validations:
      required: false